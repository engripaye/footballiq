databases:
  - name: footballiq-db
    databaseName: footballiq
    user: footballiq

services:
  - type: web
    name: footballiq-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: footballiq-db
          property: connectionString
      - key: SEED_DEMO_DATA
        value: "false"
      - key: FIXTURE_SYNC_ENABLED
        value: "true"
      - key: AUTO_SYNC_ON_STARTUP
        value: "true"
      - key: SYNC_REQUEST_DELAY_SECONDS
        value: "6.5"
      - key: DEFAULT_TIMEZONE
        value: Africa/Lagos
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: footballiq-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
